get:
 tags:
 - Scripts
 summary: Web Socket Connection to execute scripts on proxiport client(s)
 operationId: WsScriptsGet
 description: >2
 NOTE: swagger is not designed to document WebSocket API. This is a temporary solution.

 A new web socket is created for each new request to execute a script on
 proxiport client(s).
 Steps:
 1. To pass authentication - first obtain a one-time ticket from the 'ws-ticket' endpoint (a normal bearer-authenticated GET), then include its value as the "ticket" query param on this URL. Browsers cannot set an Authorization header on a WebSocket handshake, so a short-lived, single-use ticket is used here instead of the bearer token, keeping the long-lived token out of URLs and logs. Non-browser clients may alternatively use HTTP basic auth.
 2. Upgrades the current connection to Web Socket.
 3. Then server waits for an inbound script message from UI client. It should be a JSON object `ExecuteScriptRequest`(see in 'Models'):
 For example,
 ```json
 {
 "script": "Y2QgL1VzZXJzL2JyZWF0aGJhdGgvc3NsCmxzIC1sYQpjZCBnb2tleQpjYXQgTElDRU5TRQ==",
 "client_ids": [ "qa-lin-debian9", "qa-lin-debian10", "qa-lin-centos8", "qa-lin-ubuntu18", "qa-lin-ubuntu16" ],
 "group_ids": [ "group-1"],
 "timeout_sec": 30,
 "cwd": "/users/root",
 "execute_concurrently": true,
 "is_sudo": true
 }
 ```
 5. Proxiport server will create the provided script as a shell script file in the target client(s) (e.g. `/tmp/f68a779d-1d46-414a-b165-d8d2df5f348c.sh` or `f68a779d-1d46-414a-b165-d8d2df5f348.ps1`).
 Then it will run this script as a regular command e.g. `sh /tmp/f68a779d-1d46-414a-b165-d8d2df5f348c.sh`
 If it fails, the server sends an outbound JSON message `ErrorPayload`(see in 'Models') and closes the connection. The temp script will be deleted anyway.
 6. Partial stdout and stderr messages are streamed with JSON message `JobPartial` (see in 'Models').
 7. As soon as the script finishes a final result from each proxiport client is sent with JSON message `Job`(see in 'Models').
 The final result contains full stdout and stderr outputs.
 It can contain a non-empty 'error' field if server wasn't able to send the command to the proxiport client.
 Number of final outbound messages is expected to be as many as proxiport clients. Or less if it's not a concurrent mode and 'abort_on_error' is turned on.
 8. As soon as all proxiport clients send back the result - the connection is closed by server.
 9. Also, a current connection can be closed by UI client.

 There is a simple UI for testing. Try it out on http://127.0.0.1:3000/api/v1/test/scripts/ui. You can enable this api by setting `enable_ws_test_endpoints=true` in the configuration file.
 parameters:
 - name: ticket
 in: query
 description: >-
 One-time ticket obtained from the 'ws-ticket' endpoint. Required to pass
 the authentication (unless HTTP basic auth is used).
 required: true
 schema:
 type: string
 responses:
 '200':
 description: On success upgrades current connection to websocket
 content:
