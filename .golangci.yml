version: "2"

run:
  timeout: 5m
  tests: true
  issues-exit-code: 1

linters:
  default: none
  enable:
    - errcheck
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    gocyclo:
      min-complexity: 40
    govet:
      enable:
        - shadow
    misspell:
      locale: US
    nakedret:
      max-func-lines: 20
    revive:
      confidence: 0.8
    unparam:
      check-exported: false

  exclusions:
    rules:
      - linters:
          - gosec
        text: "G401: Use of weak cryptographic primitive"
      - linters:
          - gosec
        text: "G404: Use of weak random number generator"
      - linters:
          - gosec
        text: "G501: Blocklisted import crypto/md5"
      - linters:
          - gosec
        text: "G505: Blocklisted import crypto/sha1"
      - linters:
          - gosec
        text: "G204: Subprocess launched with"
      - linters:
          - govet
        text: 'shadow: declaration of "err" shadows'
      - linters:
          - govet
        text: 'shadow: declaration of "c\." shadows'
      - linters:
          - staticcheck
        text: "SA1019"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/proximile/proxiport

issues:
  new: true
