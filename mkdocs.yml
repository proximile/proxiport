site_name: ProxiPort
site_description: Self-hosted remote-management server. Fully open source.
site_url: https://docs.proxiport.net/
repo_url: https://github.com/proximile/proxiport
repo_name: proximile/proxiport
copyright: "Copyright &copy; 2026 Proximile LLC. AGPL-3.0-or-later."

theme:
  name: material
  logo: assets/wordmark.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Origin and licensing: origin.md
  - What changed from openrport: changes-from-openrport.md
  - Architecture: architecture.md
  - Install: install.md
  - Migrating from rport / openrport: migration.md
  - Operator runbook: operator-runbook.md
  - Authentication:
    - API auth: api-authentication.md
    - Client auth: client-authentication.md
  - Server hardening:
    - HTTPS: https.md
    - IP-address determination: ip-address-determination.md
  - Working with clients:
    - Command execution: command-execution.md
    - Scripts: scripts.md
    - Tunnel hosting: tunnel-hosting.md
    - Watchdog: watchdog.md
    - Vault: vault.md
  - Configuration:
    - Client groups and permissions: client-groups-permissions.md
    - Monitoring: monitoring.md
    - Client attributes file: client-attributes.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - assets/image-links.js
