[supervisord]
logfile=/var/lib/proxiport/supervisord.log ; supervisord log file
logfile_maxbytes=50MB       ; maximum size of logfile before rotation
logfile_backups=10          ; number of backed up logfiles
loglevel=debug ; info, debug, warn, trace
pidfile=/var/lib/proxiport/supervisord.pid ; pidfile location
nodaemon=true            ; run supervisord as a daemon
minfds=1024                 ; number of startup file descriptors
minprocs=200                ; number of process descriptors
childlogdir=/var/lib/proxiport/            ; where child log files will live

[program:proxiport]
command=/usr/local/bin/proxiportd --data-dir /var/lib/proxiport -c /etc/proxiport/proxiportd.conf
autostart=true
autorestart=true
startsecs=10

## same setting for 2nd service
[program:guacamole-daemon]
command=/usr/sbin/guacd -f -b 0.0.0.0 -l 4822
autostart=true
autorestart=true
startsecs=10
stderr_logfile=/dev/stdout
stderr_logfile_maxbytes = 0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes = 0
