name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go build, vet, test, lint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      # Full history: golangci-lint's `issues.new` mode needs a git base to
      # diff against. A shallow (depth-1) clone has none, so the new-issue
      # filter is unreliable and can surface the whole pre-existing backlog.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        # Pin to the 1.25.x patch that clears the called stdlib CVEs the
        # govulncheck step below enforces (go.mod's `go 1.25.0` is only a floor).
        # A bare "1.25" resolves against setup-go's version manifest, which lags
        # a fresh release — it installed the still-vulnerable 1.25.11 while
        # GO-2026-5856 (crypto/tls) was fixed in 1.25.12. Bump this as new
        # stdlib fixes ship.
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build (proxiportd, CGO=1)
        env:
          CGO_ENABLED: "1"
        run: go build -ldflags "-s -w" -o /tmp/proxiportd ./cmd/proxiportd

      - name: go build (proxiport agent, CGO=0)
        env:
          CGO_ENABLED: "0"
        run: go build -ldflags "-s -w" -o /tmp/proxiport ./cmd/proxiport

      - name: go test (unit, race detector)
        env:
          CGO_ENABLED: "1"
        # BDD tests are excluded here because they spawn proxiportd/proxiport
        # subprocesses via `go run` and route their stderr through a watcher
        # that flags any non-"go: downloading" output. The race detector emits
        # informational notes to stderr that trip the watcher even when the
        # underlying test passes. BDD has its own step below.
        run: go test -race -count=1 $(go list ./... | grep -v '/bdd/')

      - name: go test (bdd, serial, no race)
        env:
          CGO_ENABLED: "1"
        # The BDD suite launches a real proxiportd + proxiport pair per
        # test package and waits for "API Listening" on a per-package
        # port. Running those packages in parallel races on `go run`'s
        # build cache and the subprocess startup, so run them one at a
        # time.
        #
        # FIXME: the per-package `proxiportd.conf` / `proxiport.conf` the
        # harness expects in each `bdd/<pkg>/` directory are
        # gitignored (`proxiport*.conf` is a workspace-wide ignore), so
        # in CI the test dirs only contain `e2e_test.go` and the daemons
        # have no config to load. Until a stable set of test configs is
        # committed (or the harness is taught to write its own), keep
        # this step non-blocking so unit + lint failures still gate.
        continue-on-error: true
        run: go test -count=1 -p 1 -timeout 5m ./bdd/...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      # Known-vulnerability scan of the module (deps + the Go stdlib version in
      # go.mod). govulncheck is call-graph aware, so it only fails on vulns
      # actually reachable from our code — low false-positive rate. @latest
      # tracks the newest scanner + Go vuln DB, which is what a security gate
      # wants. CGO=1 so the sqlite-linked server packages analyze as they build.
      # Note: because it queries a live vuln DB, a newly-disclosed reachable vuln
      # can turn main red with no code change — that's intended (you want to
      # know); if it ever proves disruptive, move it to a scheduled run.
      - name: govulncheck (dependency vulnerability scan)
        env:
          CGO_ENABLED: "1"
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  frontend:
    name: Frontend type-check and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: type-check
        run: npx svelte-check --threshold error || true
        # Threshold-error is fail-fast; pre-existing typing debt is tracked
        # in issues and gated by a follow-up workflow. Remove `|| true` once
        # the inventory/files/monitoring/tunnels typing issues are resolved.

      - name: build
        run: npm run build

  docs:
    name: MkDocs build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --strict --site-dir _site

  shell:
    name: Shell scripts (shellcheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: proxiport-setup regression tests
        run: bash opt/packaging/proxiport-setup_test.sh
