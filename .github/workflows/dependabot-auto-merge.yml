name: dependabot-auto-merge

# Auto-merge Dependabot pull requests for patch and minor version bumps
# once the required CI checks pass. Major-version bumps are left for a
# human to review and merge.
#
# This only *enables* auto-merge; GitHub completes the merge only after
# the branch-protection required checks are green, so a bump that breaks
# the build is never merged. Depends on the repo's "Allow auto-merge"
# setting being on.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor updates
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
