name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # goreleaser bundles frontend/build into the proxiportd package and
      # tarball, so the SPA must be built before goreleaser runs.
      - name: Build SPA
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      # The proxiportd build is CGO=1 (sqlite). The runner is x86_64; the
      # aarch64 cross toolchain (gcc-aarch64-linux-gnu) is required to
      # build the linux/arm64 server binary. .goreleaser.yml selects
      # `CC=aarch64-linux-gnu-gcc` for that target via build-time env.
      - name: Install build deps (incl. linux/arm64 cross toolchain)
        run: sudo apt-get update && sudo apt-get install -y build-essential gcc-aarch64-linux-gnu

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Use a fine-grained PAT (RELEASE_PAT, scoped contents: write
          # on this repo) instead of GITHUB_TOKEN so the release-published
          # event propagates to the downstream deploy-demo workflow.
          # Workflows triggered by GITHUB_TOKEN cannot trigger further
          # workflows — that's the documented anti-loop guard. Falls back
          # to GITHUB_TOKEN on forks / dispatch where RELEASE_PAT is
          # absent, so the release still cuts.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
