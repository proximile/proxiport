name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The proxiportd build is CGO=1 (sqlite). The runner is x86_64; the
      # aarch64 cross toolchain (gcc-aarch64-linux-gnu) is required to
      # build the linux/arm64 server binary. .goreleaser.yml selects
      # `CC=aarch64-linux-gnu-gcc` for that target via build-time env.
      - name: Install build deps (incl. linux/arm64 cross toolchain)
        run: sudo apt-get update && sudo apt-get install -y build-essential gcc-aarch64-linux-gnu

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
