# Server config for the client_attributes/update end-to-end test.
# Non-secret, deterministic values. Logging is left on stdout (no
# log_file) so the harness can read "API Listening"; nothing must reach
# stderr. The test PUTs new attributes and expects HTTP 200.
[server]
  address = "127.0.0.1:8011"
  key_seed = "bdd-test-key-seed-do-not-use-in-production"
  auth = "clientAuth1:1234"
  data_dir = "./rd-test-resources"
  pairing_url = ""

[logging]
  log_level = "info"

[api]
  address = "127.0.0.1:4011"
  auth = "admin:foobaz"
  jwt_secret = "bdd-test-jwt-secret"
