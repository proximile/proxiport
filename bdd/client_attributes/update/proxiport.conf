# Agent config for the client_attributes/update end-to-end test.
# Non-secret, deterministic values. Logging is left on stdout (no
# log_file) so the harness can read "info: client: Connected"; nothing
# must reach stderr.
#
# attributes_file_path points at a writable, package-local JSON file. The
# test writes this file before start (initial tags/labels) and the agent
# writes back to it when the server pushes an attribute update, so the
# PUT succeeds with HTTP 200.
[client]
  server = "127.0.0.1:8011"
  auth = "clientAuth1:1234"
  data_dir = "./rc-test-resurces"
  attributes_file_path = "./client_attributes.json"
  use_system_id = false
  use_hostname = false
  id = "bdd-update-client"
  name = "bdd-update-client"

[connection]
  keep_alive = "3m"
  max_retry_count = -1

[logging]
  log_level = "info"

[monitoring]
  enabled = false
