# Agent config for the client_attributes/fail_update end-to-end test.
# Non-secret, deterministic values. Logging is left on stdout (no
# log_file) so the harness can read "info: client: Connected"; nothing
# must reach stderr.
#
# IMPORTANT: attributes_file_path is intentionally NOT set. The agent's
# update-attributes handler rejects the update when no attributes file is
# backing the client, which the server surfaces as HTTP 409 (Conflict) —
# exactly what this test asserts. Pointing attributes_file_path at a
# writable file would instead let the update succeed (HTTP 200) and fail
# the test; pointing it at an unreadable file would print to stderr at
# startup and also fail the test. Leaving it unset is the only setting
# that yields a clean 409.
[client]
  server = "127.0.0.1:8013"
  auth = "clientAuth1:1234"
  data_dir = "./rc-test-resurces"
  use_system_id = false
  use_hostname = false
  id = "bdd-fail-update-client"
  name = "bdd-fail-update-client"

[connection]
  keep_alive = "3m"
  max_retry_count = -1

[logging]
  log_level = "info"

[monitoring]
  enabled = false
