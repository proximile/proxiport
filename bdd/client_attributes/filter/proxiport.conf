# Agent config for the client_attributes/filter end-to-end test.
# Non-secret, deterministic values. Logging is left on stdout (no
# log_file) so the harness can read "info: client: Connected"; nothing
# must reach stderr.
#
# attributes_file_path loads the committed client_attributes.json fixture
# at startup, so the agent reports the tags/labels the test asserts on.
[client]
  server = "127.0.0.1:8012"
  auth = "clientAuth1:1234"
  data_dir = "./rc-test-resurces"
  attributes_file_path = "./client_attributes.json"
  use_system_id = false
  use_hostname = false
  id = "bdd-filter-client"
  name = "bdd-filter-client"

[connection]
  keep_alive = "3m"
  max_retry_count = -1

[logging]
  log_level = "info"

[monitoring]
  enabled = false
