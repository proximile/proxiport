# Server config for the simple_client_connects end-to-end test.
# Non-secret, deterministic values. Logging is intentionally left on
# stdout (no log_file) so the test harness can read the "API Listening"
# line; nothing must be written to stderr.
[server]
  address = "127.0.0.1:8010"
  key_seed = "bdd-test-key-seed-do-not-use-in-production"
  auth = "clientAuth1:1234"
  data_dir = "./rd-test-resources"
  pairing_url = ""

[logging]
  log_level = "info"

[api]
  address = "127.0.0.1:4010"
  auth = "admin:foobaz"
  jwt_secret = "bdd-test-jwt-secret"
