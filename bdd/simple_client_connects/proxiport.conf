# Agent config for the simple_client_connects end-to-end test.
# Non-secret, deterministic values. Logging is left on stdout (no
# log_file) so the harness can read the "info: client: Connected" line;
# nothing must be written to stderr.
[client]
  server = "127.0.0.1:8010"
  auth = "clientAuth1:1234"
  data_dir = "./rc-test-resurces"
  use_system_id = false
  use_hostname = false
  id = "bdd-simple-client"
  name = "bdd-simple-client"

[connection]
  keep_alive = "3m"
  max_retry_count = -1

[logging]
  log_level = "info"

[monitoring]
  enabled = false
